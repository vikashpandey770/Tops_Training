<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Theme Switcher</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div id="mainContainer" class="container py-5 bg-light text-dark rounded shadow">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Movie Ticket Booking</h2>

        <!-- Theme Switcher Button -->
        <button id="themeBtn" class="btn btn-primary">
            Switch to Dark Mode
        </button>
    </div>

    <p>
        Welcome! Click the button above to switch between light and dark themes.
    </p>

    <button class="btn btn-success">
        Book Ticket
    </button>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const container = document.getElementById("mainContainer");
    const themeBtn = document.getElementById("themeBtn");

    themeBtn.addEventListener("click", function () {
        container.classList.toggle("bg-light");
        container.classList.toggle("bg-dark");

        container.classList.toggle("text-dark");
        container.classList.toggle("text-light");

        if (container.classList.contains("bg-dark")) {
            themeBtn.textContent = "Switch to Light Mode";
        } else {
            themeBtn.textContent = "Switch to Dark Mode";
        }
    });
</script>

</body>
</html>
