<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light text-dark">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">MyWebsite</a>

            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="home" class="container py-5">
        <h1 class="text-primary">Home</h1>
        <p>Welcome to our Bootstrap landing page.</p>
    </section>

    <section id="about" class="container py-5 bg-white rounded shadow-sm">
        <h1 class="text-primary">About</h1>
        <p>Learn more about our services and mission.</p>
    </section>

    <section id="contact" class="container py-5">
        <h1 class="text-primary">Contact</h1>
        <p>Email: contact@example.com</p>
    </section>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <h5>Follow Us</h5>

            <a href="#" class="text-white fs-3 mx-2">
                <i class="bi bi-instagram"></i>
            </a>

            <a href="#" class="text-white fs-3 mx-2">
                <i class="bi bi-facebook"></i>
            </a>

            <a href="#" class="text-white fs-3 mx-2">
                <i class="bi bi-twitter-x"></i>
            </a>

            <a href="#" class="text-white fs-3 mx-2">
                <i class="bi bi-youtube"></i>
            </a>

            <p class="mt-3 mb-0">&copy; 2026 MyWebsite. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
