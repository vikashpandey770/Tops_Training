<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive BookMyShow Movie Details</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="row align-items-center">

        <!-- Movie Poster -->
        <div class="col-12 col-md-6 mb-4 mb-md-0">
            <img src="https://via.placeholder.com/350x500"
                 class="img-fluid rounded shadow"
                 alt="Movie Poster">
        </div>

        <!-- Movie Details -->
        <div class="col-12 col-md-6">
            <h2>Avengers: Endgame</h2>
            <p><strong>Genre:</strong> Action, Adventure, Sci-Fi</p>
            <p><strong>Rating:</strong> ⭐ 8.4/10</p>
            <p>
                After the devastating events of Infinity War, the Avengers
                assemble once more to reverse Thanos' actions and restore
                balance to the universe.
            </p>

            <button class="btn btn-danger">
                Book Now
            </button>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
