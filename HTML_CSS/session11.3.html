<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Style Restaurant List</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="text-center text-danger mb-4">🍽 Popular Restaurants</h2>

    <div class="row g-4">

        <!-- Restaurant 1 -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="image\downl.png" class="card-img-top" alt="Restaurant" style="height: 250px;">
                <div class="card-body">
                    <h5 class="card-title">La Bella Italia</h5>
                    <p class="text-muted">Italian • Pizza • Pasta</p>

                    <span class="badge bg-success">4.7</span>
                    <span class="badge bg-info text-dark">20% OFF</span>
                    <span class="badge bg-success">Open</span>

                    <p class="mt-3 mb-0">Downtown</p>
                </div>
            </div>
        </div>

        <!-- Restaurant 2 -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="image\download (2).jfif" class="card-img-top" alt="Restaurant" style="height: 250px;">
                <div class="card-body">
                    <h5 class="card-title">Spice Kingdom</h5>
                    <p class="text-muted">North Indian • Biryani</p>

                    <span class="badge bg-warning text-dark">4.2</span>
                    <span class="badge bg-primary text-white">Flat ₹150 OFF</span>
                    <span class="badge bg-success">Open</span>

                    <p class="mt-3 mb-0"> City Center</p>
                </div>
            </div>
        </div>

        <!-- Restaurant 3 -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="image\images.jfif" class="card-img-top" alt="Restaurant" style="height: 250px;">
                <div class="card-body">
                    <h5 class="card-title">Dragon Bowl</h5>
                    <p class="text-muted">Chinese • Asian</p>

                    <span class="badge bg-danger">3.8</span>
                    <span class="badge bg-secondary">Buy 1 Get 1</span>
                    <span class="badge bg-danger">Closed</span>

                    <p class="mt-3 mb-0">Riverside</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
