<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5 d-flex justify-content-center">
    <div class="card border-0 shadow-sm p-3" style="max-width: 450px; border-radius: 12px;">
        
        <div class="row g-3 align-items-center mb-3">
            <div class="col-3">
                <img src="image\images (1).jfif" 
                     class="img-fluid rounded" alt="Poster">
            </div>
            
            <div class="col-9">
                <h5 class="fw-bold text-dark mb-1">Interstellar</h5>
                <p class="small text-muted mb-2">English • 2D • 2h 49m</p>
                <p class="fs-5 fw-semibold text-danger mb-0">★ 9.1<span class="fs-6 fw-normal text-muted ms-1">(342K Votes)</span></p>
            </div>
        </div>

        <hr class="text-muted my-2">

        <div class="mt-2">
            <div class="d-flex justify-content-between small mb-2">
                <!-- User Meta: Medium weight vs Light weight -->
                <span class="fw-medium text-secondary">Rahul Sharma</span>
                <span class="text-muted fw-light">2 days ago</span>
            </div>
            <p class="fs-6 fw-normal text-dark lh-sm mb-0">
                An absolute masterpiece that demands to be experienced on the biggest screen possible. Hans Zimmer's score gives me goosebumps every single time!
            </p>
        </div>

    </div>
</div>

</body>
</html>
