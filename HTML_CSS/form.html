<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <div>
            <label for="">Enter your name</label>
            <input type="text" pattern="[A-Za-z]+" required placeholder="Enter your name">
        </div>


        <div>
            <label for="">Enter your surname</label>
            <input type="text" pattern="[A-Za-z]{3,8}" required placeholder="Enter your surname">
        </div>
        
<div>
            <label for="">Enter your email</label>
            <input type="email" required placeholder="Enter your email">
        </div>
        

        <div>
            <label for="">Enter your mobile</label>
            <input type="tel" pattern="[6-9][0-9]{9}" maxlength="10" required placeholder="Enter your number">
        </div>
        

        <div>
            <label for="">Enter Your Password</label>
            <input type="password" pattern="[A-Z][a-z0-9]{8,12}" required placeholder="Enter your password">
        </div>

        <div>
            <input type="submit">
        </div>

    </form>

</body>
</html>
