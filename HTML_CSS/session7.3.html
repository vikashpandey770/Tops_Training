<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Style Product Grid</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f1f3f6;
        padding: 30px;
    }

    .products {
        max-width: 1100px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }

    .card {
        background: #fff;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 5px;
    }

    .product-name {
        margin-top: 12px;
        font-size: 18px;
        font-weight: bold;
        color: #212121;
    }

    .price {
        margin-top: 8px;
        color: #388e3c;
        font-size: 17px;
        font-weight: bold;
    }

    @media (max-width: 768px) {
        .products {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 480px) {
        .products {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<section class="products">

    <div class="card">
        <img src="image\download (2).jfif" style="height: 150px; width: 150px;" alt="Product 1">
        <div class="product-name">Wireless Headphones</div>
        <div class="price">₹1,999</div>
    </div>

    <div class="card">
        <img src="image\imagess.jfifalt=Product 2" style="height: 150px; width: 150px;">
        <div class="product-name">Smart Watch</div>
        <div class="price">₹2,499</div>
    </div>

    <div class="card">
        <img src="image\download (1).jfif"style="height: 150px; width: 150px;" alt="Product 3">
        <div class="product-name">Bluetooth Speaker</div>
        <div class="price">₹1,299</div>
    </div>

    <div class="card">
        <img src="image\images (2).jfif" style="height: 150px; width: 150px;" alt="Product 4">
        <div class="product-name">Laptop Backpack</div>
        <div class="price">₹899</div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x180" alt="Product 5">
        <div class="product-name">Running Shoes</div>
        <div class="price">₹2,999</div>
    </div>

    <div class="card"> 
        <img src="image\download.jfif" style="height: 150px; width: 150px;" alt="Product 6">
        <div class="product-name">Gaming Mouse</div>
        <div class="price">₹799</div>
    </div>

</section>

</body>
</html>
