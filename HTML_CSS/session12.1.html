<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Artist Landing Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="stylee.css">
</head>
<body>

<div class="container py-5">
    <div class="artist-card text-center mx-auto">

        <!-- Profile Image -->
        <img src="image\images (2).jfif"
             alt="Artist Profile" style="height: 120px;"
             class="artist-img">

        <!-- Artist Name -->
        <h1 class="mt-3">Ariana Melody</h1>

        <!-- Short Bio -->
        <p class="lead">
            Singer, songwriter, and performer passionate about creating
            soulful music that connects with people around the world.
            Listen to the latest singles and follow the musical journey!
        </p>

        <!-- Social Media Buttons -->
        <div class="mt-4">
            <a href="#" class="btn btn-primary me-2">
                <i class="bi bi-facebook"></i> Facebook
            </a>

            <a href="#" class="btn btn-danger me-2">
                <i class="bi bi-instagram"></i> Instagram
            </a>

            <a href="#" class="btn btn-dark">
                <i class="bi bi-youtube"></i> YouTube
            </a>
        </div>

    </div>
</div>

</body>
</html>
