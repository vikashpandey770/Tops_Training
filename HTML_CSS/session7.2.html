<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist Bar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="playlist-bar">
        <!-- Song Card 1 -->
        <div class="song-card">
            <div class="song-details">
                <span class="song-name">Blinding Lights</span>
                <span class="artist-name">The Weeknd</span>
            </div>
        </div>

        <!-- Song Card 2 -->
        <div class="song-card">
            <div class="song-details">
                <span class="song-name">Stay</span>
                <span class="artist-name">The Kid LAROI, Justin Bieber</span>
            </div>
        </div>

        <!-- Song Card 3 -->
        <div class="song-card">
            <div class="song-details">
                <span class="song-name">As It Was</span>
                <span class="artist-name">Harry Styles</span>
            </div>
        </div>

        <!-- Song Card 4 -->
        <div class="song-card">
            <div class="song-details">
                <span class="song-name">Starboy</span>
                <span class="artist-name">The Weeknd</span>
            </div>
        </div>

        <!-- Song Card 5 -->
        <div class="song-card">
            <div class="song-details">
                <span class="song-name">Flowers</span>
                <span class="artist-name">Miley Cyrus</span>
            </div>
        </div>
    </div>

</body>
</html>
