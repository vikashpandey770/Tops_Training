<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Filter Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h3 class="mb-3">Food Categories</h3>
    <div class="btn-group" role="group" aria-label="Food Filters">
        <button type="button" class="btn btn-outline-primary active">All</button>
        <button type="button" class="btn btn-outline-success">Veg</button>
        <button type="button" class="btn btn-outline-danger">Non-Veg</button>
        <button type="button" class="btn btn-outline-warning">Desserts</button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
